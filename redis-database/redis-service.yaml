# Service for Redis Master (read/write)
apiVersion: v1
kind: Service
metadata:
  name: redis-master
  namespace: redis
  labels:
    app: redis
    role: master
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: client
  selector:
    app: redis
    role: master

---
# Service targeting all Redis pods (just the master since replica was removed
# to stay under the OCI Always Free 200 GB / 5-volume cap; if a replica is
# re-introduced, this service auto-targets it via app=redis selector)
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: redis
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: client
  selector:
    app: redis
