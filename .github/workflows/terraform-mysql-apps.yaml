name: 06 - Deploy MySQL Apps

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy MySQL Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
      TF_VAR_fingerprint: ${{ secrets.OCI_CLI_FINGERPRINT }}
      TF_VAR_private_key: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      TF_VAR_region: ${{ secrets.OCI_CLI_REGION }}
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_CLI_TENANCY }}
      TF_VAR_user_ocid: ${{ secrets.OCI_CLI_USER }}
      TF_VAR_project: junaid
      working_directory: ./terraform/06-mysql-apps/

    defaults:
      run:
        working-directory: ${{ env.working_directory }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.INFRA_WIF_PROVIDER }}
          service_account: ${{ secrets.INFRA_GCP_SA_EMAIL }}

      - name: Load creds from Secret Manager
        id: creds
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          secrets: |-
            MYSQL_ADMIN_USER:firebase-cloud-491613/db-admin-user
            MYSQL_ADMIN_PASS:firebase-cloud-491613/db-admin-pass
            OCI_TF_AWS_KEY:firebase-cloud-491613/oci-tf-aws-access-key-id
            OCI_TF_AWS_SECRET:firebase-cloud-491613/oci-tf-aws-secret-access-key

      - name: Export creds to terraform env
        run: |
          echo "TF_VAR_mysql_admin_username=${{ steps.creds.outputs.MYSQL_ADMIN_USER }}" >> $GITHUB_ENV
          echo "TF_VAR_mysql_admin_password=${{ steps.creds.outputs.MYSQL_ADMIN_PASS }}" >> $GITHUB_ENV
          echo "AWS_ACCESS_KEY_ID=${{ steps.creds.outputs.OCI_TF_AWS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ steps.creds.outputs.OCI_TF_AWS_SECRET }}" >> $GITHUB_ENV

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.3

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: Show provisioned apps
        run: terraform output provisioned_apps
